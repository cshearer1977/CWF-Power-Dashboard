name: Daily data refresh

on:
  schedule:
    # 06:15 UTC every day. GitHub may delay scheduled runs during high load;
    # this window avoids the top-of-the-hour queue.
    - cron: "15 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch Ember
        env:
          EMBER_API_KEY: ${{ secrets.EMBER_API_KEY }}
        run: python scripts/fetch_ember.py

      - name: Fetch Climate TRACE
        run: python scripts/fetch_climate_trace.py

      - name: Build dashboard JSON
        run: python scripts/build_dashboard.py

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/dashboard.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "data: daily refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
